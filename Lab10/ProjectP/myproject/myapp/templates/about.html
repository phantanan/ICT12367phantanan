{% extends "base.html"%}

{% block title %}
    <title>หน้าแรกของเว็บไซต์ | ผลงานของเรา</title>
    <style>
        /* CSS สำหรับจัดการ Style และ Hover Effect */
        
        /* 1. เตรียมความพร้อมของรูปภาพ */
        .gallery-item {
            overflow: hidden; /* ป้องกันรูปภาพล้นขอบช่องเมื่อขยายตัว */
            border-radius: 10px; /* ทำมุมโค้งให้ช่องรวม */
            transition: all 0.3s ease-in-out; /* ทำให้การเปลี่ยนแปลงนุ่มนวล */
            border: 3px solid transparent; /* สร้างขอบใสรอไว้ก่อน (กันขยับเวลา hover) */
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); /* เพิ่มเงาบางๆ ให้ดูมีมิติ */
        }

        .gallery-item img {
            transition: transform 0.3s ease-in-out; /* ทำให้รูปขยายอย่างนุ่มนวล */
            width: 100%;
            height: 250px; /* กำหนดความสูงคงที่เพื่อให้เรียงกันสวย */
            object-fit: cover; /* ตัดรูปให้พอดีช่องโดยไม่เสียสัดส่วน */
        }

        /* 2. Effect เมื่อเอาเมาส์ไปชี้ (Hover) */
        .gallery-item:hover {
            transform: translateY(-5px); /* ยกตัวขึ้นเล็กน้อย */
            border-color: #0d6efd; /* เปลี่ยนสีขอบเป็นสีฟ้า (Bootstrap Primary) */
            box-shadow: 0 8px 15px rgba(13, 110, 253, 0.2); /* เพิ่มเงาสีฟ้า */
        }

        .gallery-item:hover img {
            transform: scale(1.1); /* ขยายรูปภาพขึ้น 10% */
        }

        /* ปรับปรุง Font และระยะห่างของหัวข้อ */
        .gallery-title h1 {
            font-weight: 700;
            color: #333;
        }
    </style>
{% endblock %}
